<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Blood Oath</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

  <h1>BLOOD OATH</h1>

  <nav>

    <a href="index.html">Home</a>

    <a href="classes.html">Classes</a>

    <a href="raids.html">Raids</a>

    <a href="ranking.html">Ranking</a>

  </nav>

</header>

<main>

  <section class="hero">

    <h2>Bem Vindo</h2>

    <p>Raids Semanais     
    </p>

  </section>

  <!-- LOGIN -->

<section class="raid-login" id="login-section">

  <h2>Login da Guilda</h2>

  <div class="login-box">

    <input
      type="text"
      id="nomeJogador"
      placeholder="Nome do Personagem"
    >

    <input
      type="password"
      placeholder="Senha"
    >

    <button
      class="raid-btn"
      onclick="login()"
    >
      Entrar
    </button>

    <button
      class="create-btn"
      onclick="abrirPopup()"
    >
      Criar Conta
    </button>

  </div>

</section>

<!-- USUÁRIO LOGADO -->

<section
  class="player-panel"
  id="player-panel"
>

  <h2 id="mensagemJogador"></h2>

  <p>
    ⚔️ Membro oficial da Blood Oath ⚔️
  </p>

</section>

</main>

<script src="script.js"></script>

<!-- POPUP CADASTRO -->

<div class="popup" id="popup">

  <div class="popup-content">

    <span class="close" onclick="fecharPopup()">
      ✖
    </span>

    <h2>Criar Conta</h2>

    <input type="text" placeholder="Nome do Personagem">

    <input type="email" placeholder="Email">

    <input type="password" placeholder="Senha">

    <button class="raid-btn">
      Criar Conta
    </button>

  </div>

</div>

</body>
</html>
