<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Raids - Blood Oath</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

  <h1>BLOOD OATH</h1>

  <nav>

    <a href="index.html">Home</a>

    <a href="classes.html">Classes</a>

    <a href="raids.html">Raids</a>

    <a href="ranking.html">Ranking</a>

  </nav>

</header>

<section class="raids">

  <h2>Próximas Raids</h2>

  <div class="raid-box">

    <p>🐉 TOC/TOGC 10 - Sexta 19:00</p>

    <p>👹 ICC 10N/Hc - Sexta 20:00</p>

  </div>

</section>

<section class="raid-login">

  <h2>Confirmar Participação</h2>

  <div class="login-box">

    <!-- RAID -->

    <select id="raidSelect">

      <option>Escolha a Raid</option>

      <option>🐉 Trial Of Crusader 10N</option>

      <option>👹 Naxxramas 10N</option>

      <option>💀 Icecrown Citadel 10N</option>

    </select>

    <!-- NOME -->

    <input
      type="text"
      placeholder="Nome do personagem"
    >

    <!-- CLASSE -->

    <select
      id="classe"
      onchange="mostrarSpecs()"
    >

      <option>Escolha sua Classe</option>

      <option>Paladino</option>

      <option>Guerreiro</option>

      <option>Rogue</option>

      <option>Hunter</option>

      <option>Mago</option>

      <option>Warlock</option>

      <option>Priest</option>

      <option>Shaman</option>

      <option>Druida</option>

      <option>Cavaleiro da Morte</option>

    </select>

    <!-- ESPECIALIZAÇÃO -->

    <select id="spec">

      <option>Escolha a Especialização</option>

    </select>

    <!-- FUNÇÃO -->

    <select id="funcao">

      <option>Função</option>

      <option>🛡️ Tank</option>

      <option>⚔️ DPS</option>

      <option>✨ Healer</option>

    </select>

    <button class="raid-btn" onclick="entrarRaid()">

      Confirmar Raid

    </button>

    <div class="raid-status">

  <h3>📊 Composição da Raid</h3>

  <p id="countTank">🛡️ Tanks: 0</p>
  <p id="countDps">⚔️ DPS: 0</p>
  <p id="countHealer">✨ Healers: 0</p>

</div>

<div class="raid-roster">

  <h3>👥 Jogadores na Raid</h3>

  <ul id="listaJogadores"></ul>

</div>

  </div>

</section>

</body>
</html>
